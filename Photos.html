<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photos - Troop 234</title>

  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --brand:#003366;
      --border:#e6e6e6;
      --shadow:0 6px 18px rgba(0,0,0,0.08);
      --radius:14px;
      --max:1100px;
    }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:var(--brand);
      color:#fff;
      padding:2.25rem 1rem;
      text-align:center;
    }

    header h1{
      margin:0;
      font-size:2rem;
      letter-spacing:0.2px;
    }

    header p{
      margin:0.5rem 0 0;
      opacity:0.95;
      font-size:0.95rem;
    }

    main{
      max-width:var(--max);
      margin:0 auto;
      padding:1.25rem 1rem 2.5rem;
    }

    .controls{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:1rem;
      display:flex;
      gap:0.75rem;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      margin:0 auto 1rem;
    }

    .controls .left,
    .controls .right{
      display:flex;
      gap:0.75rem;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    label{
      font-size:0.9rem;
      color:var(--muted);
      font-weight:bold;
    }

    select, input[type="search"]{
      padding:0.55rem 0.65rem;
      border:1px solid var(--border);
      border-radius:10px;
      font-size:0.95rem;
      min-width:170px;
      background:#fff;
      color:var(--text);
    }

    input[type="search"]{
      min-width:240px;
    }

    .statusbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      margin:0.25rem 0 1rem;
      color:var(--muted);
      font-size:0.92rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:1rem;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns:repeat(2, 1fr); }
    }

    @media (max-width: 600px){
      .grid{ grid-template-columns:1fr; }
      select, input[type="search"]{ min-width:100%; }
      .controls{ justify-content:flex-start; }
      .controls .left, .controls .right{ width:100%; }
    }

    .album{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .cover{
      width:100%;
      height:190px;
      background:#ddd;
      object-fit:cover;
      display:block;
    }

    .album-body{
      padding:0.9rem 0.95rem 1rem;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
      flex:1;
    }

    .album-title{
      margin:0;
      font-size:1.05rem;
      color:var(--brand);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      margin:0;
      color:var(--muted);
      font-size:0.9rem;
      line-height:1.25rem;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:0.4rem;
      margin-top:0.15rem;
    }

    .tag{
      font-size:0.78rem;
      border:1px solid var(--border);
      color:var(--muted);
      padding:0.2rem 0.45rem;
      border-radius:999px;
      background:#fafafa;
    }

    .album-actions{
      margin-top:auto;
      display:flex;
      gap:0.5rem;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      border-radius:10px;
      padding:0.55rem 0.75rem;
      font-weight:bold;
      font-size:0.92rem;
      border:1px solid var(--brand);
      color:#fff;
      background:var(--brand);
    }

    .btn.secondary{
      background:#fff;
      color:var(--brand);
    }

    .btn:hover{ opacity:0.92; }

    .empty{
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:var(--radius);
      padding:1.25rem;
      color:var(--muted);
      text-align:center;
      display:none;
    }

    .policy{
      margin-top:0.75rem;
      font-size:0.9rem;
      color:var(--muted);
    }

    footer{
      text-align:center;
      color:var(--muted);
      padding:1.25rem 1rem 2rem;
      font-size:0.9rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Troop 234 Photos</h1>
    <p>Albums by event. Auto loads from Google Drive.</p>
  </header>

  <main>
    <div class="controls">
      <div class="left">
        <div>
          <label for="yearFilter">Year</label><br/>
          <select id="yearFilter">
            <option value="all">All</option>
          </select>
        </div>
      </div>

      <div class="right">
        <div style="width:100%;">
          <label for="searchBox">Search</label><br/>
          <input id="searchBox" type="search" placeholder="Search albums..." />
        </div>
      </div>
    </div>

    <div class="statusbar">
      <div id="statusText">Loading...</div>
      <div id="countText"></div>
    </div>

    <div id="albumGrid" class="grid"></div>

    <div id="emptyState" class="empty">
      No albums match your filters.
    </div>

    <div class="policy">
      Photo policy: We only post photos for Scouts and families who gave permission. If you want a photo removed, contact Troop234Scouting@gmail.com.
    </div>
  </main>

  <footer>
    © Troop 234 Chesapeake
  </footer>

  <script>
    const WEB_APP_URL = "https://script.googleusercontent.com/macros/echo?user_content_key=AY5xjrRCnjT53U1rGec1qTV_whL-VXVSsuzuy6-zVjUmUUkL6YxcPu2BT1MkWQHfGoUvAdFjLzZXZJbyKjLjp0Hj3UENVwYawD9tCLG0QcjW7s7GFEcrpXHTEcVASYrvK38fggTCM9MDlDpK0GcsEzo8ztu1FNNyq38-4KyP3rLeDYAe-fmkorz-vUOu_-6yliLJKxwPtopT5kfquOMNW_jhWIS195_xKlzP2fj9kyNuyqJpDRWJwEgRRT9AIsDLzrDdsjouj941d-VeFvxnfyyCLVtJb7zB0Sqq-p6ghMIYhNBYHFjcwPE&lib=MlqOadRcGyF9vy0zbFLIwT9GPxoqFZwZb";

    const yearFilter = document.getElementById("yearFilter");
    const searchBox = document.getElementById("searchBox");
    const albumGrid = document.getElementById("albumGrid");
    const emptyState = document.getElementById("emptyState");
    const statusText = document.getElementById("statusText");
    const countText = document.getElementById("countText");

    let allAlbums = [];
    let shownAlbums = [];

    function uniqueYearsFromFeed(feed){
      const years = Object.keys(feed.years || {});
      years.sort((a,b) => (b + "").localeCompare(a + ""));
      return years;
    }

    function fillYears(years){
      // Keep existing "All" then append years
      const existing = new Set(Array.from(yearFilter.options).map(o => o.value));
      years.forEach(y => {
        if (existing.has(y)) return;
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        yearFilter.appendChild(opt);
      });
    }

    function formatUpdated(iso){
      if(!iso) return "";
      try{
        const d = new Date(iso);
        if (isNaN(d.getTime())) return "";
        return d.toLocaleDateString();
      }catch{
        return "";
      }
    }

    function safeUrl(path){
      return path ? encodeURI(path) : "#";
    }

    function matchesFilters(a){
      const yearVal = yearFilter.value;
      const q = (searchBox.value || "").trim().toLowerCase();

      if (yearVal !== "all" && a.year !== yearVal) return false;

      if (q){
        const hay = [
          a.title, a.year
        ].filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }

      return true;
    }

    function card(a){
      const div = document.createElement("div");
      div.className = "album";

      const img = document.createElement("img");
      img.className = "cover";
      img.src = safeUrl(a.coverThumbUrl || "");
      img.alt = a.title ? (a.title + " cover") : "Album cover";
      img.loading = "lazy";
      img.onerror = function(){
        this.style.display = "none";
      };

      const body = document.createElement("div");
      body.className = "album-body";

      const h = document.createElement("h3");
      h.className = "album-title";
      h.textContent = a.title || "Album";

      const meta = document.createElement("p");
      meta.className = "meta";
      const updated = formatUpdated(a.updated);
      const count = a.count ? (a.count + " photos") : "";
      const parts = [updated ? ("Updated " + updated) : "", count].filter(Boolean);
      meta.textContent = parts.join(" • ");

      const tags = document.createElement("div");
      tags.className = "tags";

      const t1 = document.createElement("span");
      t1.className = "tag";
      t1.textContent = a.year || "";
      if (a.year) tags.appendChild(t1);

      const actions = document.createElement("div");
      actions.className = "album-actions";

      const openFolder = document.createElement("a");
      openFolder.className = "btn";
      openFolder.href = safeUrl(a.folderUrl || "#");
      openFolder.target = "_blank";
      openFolder.rel = "noopener";
      openFolder.textContent = "Open Album";

      const openCover = document.createElement("a");
      openCover.className = "btn secondary";
      openCover.href = safeUrl(a.coverViewUrl || a.folderUrl || "#");
      openCover.target = "_blank";
      openCover.rel = "noopener";
      openCover.textContent = "Open Cover";

      actions.appendChild(openFolder);
      actions.appendChild(openCover);

      body.appendChild(h);
      body.appendChild(meta);
      body.appendChild(tags);
      body.appendChild(actions);

      div.appendChild(img);
      div.appendChild(body);

      return div;
    }

    function render(){
      albumGrid.innerHTML = "";

      shownAlbums = allAlbums.filter(matchesFilters);

      countText.textContent = shownAlbums.length + " album(s)";
      emptyState.style.display = shownAlbums.length ? "none" : "block";

      shownAlbums.forEach(a => albumGrid.appendChild(card(a)));
    }

    async function loadFeed(){
      statusText.textContent = "Loading from Google Drive...";
      countText.textContent = "";
      emptyState.style.display = "none";
      albumGrid.innerHTML = "";

      try{
        const res = await fetch(WEB_APP_URL, { cache: "no-store" });
        if(!res.ok) throw new Error("Feed request failed: " + res.status);

        const feed = await res.json();

        const years = uniqueYearsFromFeed(feed);
        fillYears(years);

        // Default to newest year if user has not chosen one
        if (yearFilter.value === "all" && years.length) {
          yearFilter.value = years[0];
        }

        const flat = [];
        for (const y of years){
          for (const album of (feed.years[y] || [])){
            flat.push({ year: y, ...album });
          }
        }

        // Sort newest first
        flat.sort((a,b) => (b.updated || "").localeCompare(a.updated || ""));

        allAlbums = flat;

        statusText.textContent = (yearFilter.value === "all")
          ? "Showing all years"
          : ("Showing " + yearFilter.value);

        render();
      }catch(err){
        console.log(err);
        statusText.textContent = "Could not load albums.";
        emptyState.style.display = "block";
        emptyState.textContent = "Could not load albums. Check Drive sharing and Apps Script deployment access (Anyone).";
      }
    }

    yearFilter.addEventListener("change", () => {
      statusText.textContent = (yearFilter.value === "all")
        ? "Showing all years"
        : ("Showing " + yearFilter.value);
      render();
    });

    searchBox.addEventListener("input", render);

    loadFeed();
  </script>
</body>
</html>
