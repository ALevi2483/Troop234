<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Photos - Troop 234</title>

  <style>
    :root{
      --bg:#f5f5f5;
      --card:#ffffff;
      --text:#222;
      --muted:#666;
      --brand:#003366;
      --border:#e6e6e6;
      --shadow:0 6px 18px rgba(0,0,0,0.08);
      --radius:14px;
      --max:1100px;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family: Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header{
      background:var(--brand);
      color:#fff;
      padding:2.25rem 1rem;
      text-align:center;
    }

    header h1{
      margin:0;
      font-size:2rem;
      letter-spacing:0.2px;
    }

    header p{
      margin:0.5rem 0 0;
      opacity:0.95;
      font-size:0.95rem;
    }

    main{
      max-width:var(--max);
      margin:0 auto;
      padding:1.25rem 1rem 2.5rem;
    }

    .controls{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:1rem;
      display:flex;
      gap:0.75rem;
      flex-wrap:wrap;
      align-items:flex-end;
      justify-content:space-between;
      margin:0 auto 1rem;
    }

    .controls .left,
    .controls .right{
      display:flex;
      gap:0.75rem;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    label{
      font-size:0.9rem;
      color:var(--muted);
      font-weight:bold;
    }

    select, input[type="search"]{
      padding:0.55rem 0.65rem;
      border:1px solid var(--border);
      border-radius:10px;
      font-size:0.95rem;
      min-width:170px;
      background:#fff;
      color:var(--text);
    }

    input[type="search"]{
      min-width:240px;
    }

    .hint{
      font-size:0.9rem;
      color:var(--muted);
      margin:0.25rem 0 1rem;
    }

    .statusbar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:space-between;
      align-items:center;
      margin:0.5rem 0 1rem;
      color:var(--muted);
      font-size:0.92rem;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, 1fr);
      gap:1rem;
    }

    @media (max-width: 900px){
      .grid{ grid-template-columns:repeat(2, 1fr); }
    }

    @media (max-width: 600px){
      .grid{ grid-template-columns:1fr; }
      select, input[type="search"]{ min-width:100%; }
      .controls{ justify-content:flex-start; }
      .controls .left, .controls .right{ width:100%; }
    }

    .photo-card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:var(--radius);
      overflow:hidden;
      box-shadow:var(--shadow);
      display:flex;
      flex-direction:column;
      min-height:100%;
    }

    .photo{
      width:100%;
      height:210px;
      background:#ddd;
      object-fit:cover;
      display:block;
    }

    .photo-body{
      padding:0.9rem 0.95rem 1rem;
      display:flex;
      flex-direction:column;
      gap:0.5rem;
      flex:1;
    }

    .photo-title{
      margin:0;
      font-size:0.98rem;
      color:var(--brand);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .meta{
      margin:0;
      color:var(--muted);
      font-size:0.9rem;
      line-height:1.25rem;
    }

    .tags{
      display:flex;
      flex-wrap:wrap;
      gap:0.4rem;
      margin-top:0.15rem;
    }

    .tag{
      font-size:0.78rem;
      border:1px solid var(--border);
      color:var(--muted);
      padding:0.2rem 0.45rem;
      border-radius:999px;
      background:#fafafa;
    }

    .actions{
      margin-top:auto;
      display:flex;
      gap:0.5rem;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      border-radius:10px;
      padding:0.55rem 0.75rem;
      font-weight:bold;
      font-size:0.92rem;
      border:1px solid var(--brand);
      color:#fff;
      background:var(--brand);
    }

    .btn:hover{
      opacity:0.92;
    }

    .btn.secondary{
      background:#fff;
      color:var(--brand);
    }

    .empty{
      background:var(--card);
      border:1px dashed var(--border);
      border-radius:var(--radius);
      padding:1.25rem;
      color:var(--muted);
      text-align:center;
      display:none;
    }

    .policy{
      margin-top:0.75rem;
      font-size:0.9rem;
      color:var(--muted);
    }

    footer{
      text-align:center;
      color:var(--muted);
      padding:1.25rem 1rem 2rem;
      font-size:0.9rem;
    }
  </style>
</head>

<body>
  <header>
    <h1>Troop 234 Photos</h1>
    <p>Auto loads from Google Drive. Upload photos to Drive and refresh.</p>
  </header>

  <main>
    <div class="controls">
      <div class="left">
        <div>
          <label for="yearFilter">Year</label><br/>
          <select id="yearFilter">
            <option value="all">All</option>
          </select>
        </div>
      </div>

      <div class="right">
        <div style="width:100%;">
          <label for="searchBox">Search</label><br/>
          <input id="searchBox" type="search" placeholder="Search filenames..." />
        </div>
      </div>
    </div>

    <div class="statusbar">
      <div id="statusText">Loading...</div>
      <div id="countText"></div>
    </div>

    <div id="photoGrid" class="grid"></div>

    <div id="emptyState" class="empty">
      No photos match your filters.
    </div>

    <div class="policy">
      Photo policy: We only post photos for Scouts and families who gave permission. If you want a photo removed, contact Troop234Scouting@gmail.com.
    </div>
  </main>

  <footer>
    © Troop 234 Chesapeake
  </footer>

  <script>
    // Your Apps Script Web App URL (photo feed)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzxPbWUAO21jCrAYvDWQnQ4_lnBm9EXXqRS0oDmQM-SDXavYu5Jv-k7x-oFkU72sryhnA/exec";

    const yearFilter = document.getElementById("yearFilter");
    const searchBox = document.getElementById("searchBox");
    const photoGrid = document.getElementById("photoGrid");
    const emptyState = document.getElementById("emptyState");
    const statusText = document.getElementById("statusText");
    const countText = document.getElementById("countText");

    let allPhotos = [];   // flattened list of all photos returned by the feed
    let shownPhotos = []; // filtered list

    function safeText(s){
      return (s || "")
        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function formatDateTime(iso){
      if(!iso) return "";
      try{
        const d = new Date(iso);
        if (isNaN(d.getTime())) return iso;
        return d.toLocaleString();
      }catch{
        return iso;
      }
    }

    function fillYearSelect(years){
      // keep "All" then add years newest first
      const existing = new Set(Array.from(yearFilter.options).map(o => o.value));
      years.forEach(y => {
        if (existing.has(y)) return;
        const opt = document.createElement("option");
        opt.value = y;
        opt.textContent = y;
        yearFilter.appendChild(opt);
      });
    }

    async function loadFromFeed(){
      statusText.textContent = "Loading from Google Drive...";
      countText.textContent = "";
      photoGrid.innerHTML = "";
      emptyState.style.display = "none";

      try{
        const res = await fetch(WEB_APP_URL, { cache: "no-store" });
        if(!res.ok) throw new Error("Feed request failed: " + res.status);

        const data = await res.json();

        const years = Object.keys(data.years || {}).sort().reverse();
        fillYearSelect(years);

        const flat = [];
        for(const y of years){
          for(const item of (data.years[y] || [])){
            flat.push({ year: y, ...item });
          }
        }

        // Sort newest first based on "updated" if present
        flat.sort((a, b) => (b.updated || "").localeCompare(a.updated || ""));

        allPhotos = flat;

        // Default year selection: latest year if available, else All
        if (years.length && yearFilter.value === "all"){
          yearFilter.value = years[0];
        }

        applyFilters();

      }catch(err){
        console.log(err);
        statusText.textContent = "Could not load photos.";
        countText.textContent = "";
        emptyState.style.display = "block";
        emptyState.textContent = "Could not load photos. Check Drive sharing and your Apps Script deployment access (Anyone).";
      }
    }

    function matchesFilters(p){
      const yearVal = yearFilter.value;
      const q = (searchBox.value || "").trim().toLowerCase();

      if (yearVal !== "all" && p.year !== yearVal) return false;

      if (q){
        const hay = [
          p.name, p.year, p.updated
        ].filter(Boolean).join(" ").toLowerCase();
        if (!hay.includes(q)) return false;
      }

      return true;
    }

    function applyFilters(){
      shownPhotos = allPhotos.filter(matchesFilters);

      const yearVal = yearFilter.value;
      statusText.textContent = yearVal === "all"
        ? "Showing all years"
        : ("Showing " + yearVal);

      countText.textContent = shownPhotos.length + " photo(s)";

      render();
    }

    function render(){
      photoGrid.innerHTML = "";

      if(!shownPhotos.length){
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";

      shownPhotos.forEach(p => {
        const title = safeText(p.name || "Photo");
        const year = safeText(p.year || "");
        const updated = formatDateTime(p.updated || "");
        const thumb = p.thumbUrl || p.viewUrl || "";
        const openUrl = p.viewUrl || "#";

        const card = document.createElement("div");
        card.className = "photo-card";

        const img = document.createElement("img");
        img.className = "photo";
        img.src = thumb;
        img.alt = title;
        img.loading = "lazy";
        img.onerror = function(){
          this.style.display = "none";
        };

        const body = document.createElement("div");
        body.className = "photo-body";

        const h = document.createElement("h3");
        h.className = "photo-title";
        h.innerHTML = title;

        const meta = document.createElement("p");
        meta.className = "meta";
        meta.textContent = updated ? ("Updated: " + updated) : "";

        const tags = document.createElement("div");
        tags.className = "tags";

        if(year){
          const t = document.createElement("span");
          t.className = "tag";
          t.textContent = year;
          tags.appendChild(t);
        }

        const actions = document.createElement("div");
        actions.className = "actions";

        const a1 = document.createElement("a");
        a1.className = "btn";
        a1.href = openUrl;
        a1.target = "_blank";
        a1.rel = "noopener";
        a1.textContent = "Open in Drive";

        const a2 = document.createElement("a");
        a2.className = "btn secondary";
        a2.href = thumb || openUrl;
        a2.target = "_blank";
        a2.rel = "noopener";
        a2.textContent = "Open Image";

        actions.appendChild(a1);
        actions.appendChild(a2);

        body.appendChild(h);
        if (meta.textContent) body.appendChild(meta);
        body.appendChild(tags);
        body.appendChild(actions);

        card.appendChild(img);
        card.appendChild(body);

        photoGrid.appendChild(card);
      });
    }

    yearFilter.addEventListener("change", applyFilters);
    searchBox.addEventListener("input", applyFilters);

    loadFromFeed();
  </script>
</body>
</html>
