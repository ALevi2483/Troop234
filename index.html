<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (GA4) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-7FY6X24EQ6"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-7FY6X24EQ6', { send_page_view: false });

    function logPageView(path, title) {
      try {
        gtag('event', 'page_view', {
          page_title: title || path,
          page_location: window.location.origin + '/' + path,
          page_path: '/' + path
        });

        if (title) document.title = 'Troop 234 | ' + title;
      } catch (e) {}
    }

    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('show');
    }

    function closeMenu() {
      const nav = document.getElementById('navLinks');
      if (window.innerWidth <= 768 && nav.classList.contains('show')) {
        nav.classList.remove('show');
      }
    }

    window.addEventListener('DOMContentLoaded', function () {
      logPageView('Home.html', 'Home');
    });
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Troop 234 | Home</title>

  <style>
    :root {
      --nav: #004080;
      --nav-hover: #00264d;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    nav {
      background-color: var(--nav);
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      position: relative;
    }

    .nav-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .nav-links a {
      color: white;
      padding: 1rem;
      text-decoration: none;
      font-weight: bold;
    }

    .nav-links a:hover {
      background-color: var(--nav-hover);
    }

    .hamburger {
      display: none;
      font-size: 2rem;
      cursor: pointer;
      padding: 1rem;
      color: white;
      align-items: center;
    }

    .hamburger-label {
      display: none;
      color: white;
      font-size: 1rem;
      padding-left: 0.5rem;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 72px);
      border: none;
    }

    @media (max-width: 768px) {
      nav {
        justify-content: flex-start;
        padding-left: 1rem;
      }

      .hamburger,
      .hamburger-label {
        display: flex;
      }

      .nav-links {
        flex-direction: column;
        display: none;
        width: 100%;
      }

      .nav-links.show {
        display: flex;
      }

      .nav-links a {
        padding: 0.9rem 1rem;
        border-top: 1px solid rgba(255,255,255,0.15);
      }

      iframe {
        height: calc(100vh - 64px);
      }
    }
  </style>
</head>

<body>
  <nav aria-label="Main Navigation">
    <div class="hamburger" role="button" aria-label="Toggle menu" onclick="toggleMenu()">☰</div>
    <div class="hamburger-label">Menu</div>

    <div class="nav-links" id="navLinks">
      <a href="Home.html" target="contentFrame" onclick="closeMenu(); logPageView('Home.html','Home')">Home</a>

      <a href="Welcome.html" target="contentFrame" onclick="closeMenu(); logPageView('Welcome.html','Start Here')">Start Here</a>

      <a href="Join.html" target="contentFrame" onclick="closeMenu(); logPageView('Join.html','Join Troop 234')">Join</a>

      <a href="Calendar.html" target="contentFrame" onclick="closeMenu(); logPageView('Calendar.html','Calendar')">Calendar</a>

      <a href="Photos.html" target="contentFrame" onclick="closeMenu(); logPageView('Photos.html','Photos')">Photos</a>

      <a href="Links.html" target="contentFrame" onclick="closeMenu(); logPageView('Links.html','Resources')">Resources</a>

      <a href="Contact.html" target="contentFrame" onclick="closeMenu(); logPageView('Contact.html','Contact')">Contact</a>

      <a href="Eagle.html" target="contentFrame" onclick="closeMenu(); logPageView('Eagle.html','Eagle Scouts')">Eagle Scouts</a>

      <a href="leader-awards.html" target="contentFrame" onclick="closeMenu(); logPageView('leader-awards.html','Leader Recognition')">Leader Recognition</a>

      <a href="Member.html" target="contentFrame" onclick="closeMenu(); logPageView('Member.html','Members Only')">Members Only</a>
    </div>
  </nav>

  <iframe src="Home.html" name="contentFrame" title="Troop 234 Content"></iframe>

  <noscript>
    Please enable JavaScript to use the full Troop 234 website navigation.
  </noscript>
</body>
</html>
